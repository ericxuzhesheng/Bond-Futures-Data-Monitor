name: Daily Bond Futures Report

on:
  schedule:
    # Beijing time 19:01 = UTC 11:01, weekdays only.
    # GitHub scheduled workflows can be delayed or dropped at the start of the hour.
    # Chinese public holidays are not covered; the pipeline handles non-trading
    # days gracefully via purge_daily_data_for_date idempotency.
    - cron: "1 11 * * 1-5"
  workflow_dispatch:
    inputs:
      run_date:
        description: "Run date in YYYY-MM-DD format, or today for Asia/Shanghai"
        required: false
        default: "today"

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    env:
      USE_LIVE_DATA: "1"
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      DATABASE_PATH: data/bond_futures_monitor.db
      REPORTS_OUTPUT_DIR: reports_output
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve run date
        shell: bash
        run: |
          INPUT_DATE="${{ github.event.inputs.run_date }}"
          if [ -z "$INPUT_DATE" ]; then
            INPUT_DATE="today"
          fi
          if [ "$INPUT_DATE" = "today" ]; then
            # Resolve "today" from the UTC date, not Beijing time. The cron fires
            # at 11:01 UTC (19:01 Beijing). When GitHub delays the scheduled run
            # (it routinely does, by hours), a Beijing-based date can roll past
            # midnight to the next calendar day, which has no market data yet, so
            # the futures-coverage check aborts the run (this broke 2026-06-15).
            # The UTC date is stable across any realistic delay (11:01 UTC up to
            # ~23:59 UTC is the same UTC day) and equals the intended Beijing
            # trading day for this cron, so it stays correct whether the run is
            # punctual or hours late.
            RUN_DATE=$(date -u +%F)
          else
            RUN_DATE="$INPUT_DATE"
          fi
          echo "RUN_DATE=$RUN_DATE" >> "$GITHUB_ENV"

      - name: Run daily monitor
        run: python -m bond_futures_monitor.cli run --date "$RUN_DATE"

      - name: Run tests
        run: pytest

      # The SQLite database is version-controlled (see .gitignore), so each run
      # commits the updated database alongside the report. This gives reliable
      # cross-day history without depending on the GitHub Actions cache, which
      # is evicted after 7 days of inactivity or when the repo cache exceeds
      # its size limit.
      - name: Commit report and database
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "reports_output/${RUN_DATE}_daily_report.md"
          git add -f reports_output/daily_features.csv
          git add data/bond_futures_monitor.db
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "report: update daily bond futures report ${RUN_DATE}"
            # A scheduled run can race a manual push to main. The database is a
            # binary snapshot, so rebase (not merge) onto the latest main and
            # retry once before failing.
            git pull --rebase origin "${GITHUB_REF_NAME}" \
              && git push \
              || (git pull --rebase origin "${GITHUB_REF_NAME}" && git push)
          fi
